name: CD

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy_target:
        description: Deployment target
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production
          - both

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v6

      - name: Set image tag
        id: meta
        run: echo "image_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ./apps/web
          file: ./apps/web/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}:${{ steps.meta.outputs.image_tag }}

  staging-deployment-gate:
    runs-on: ubuntu-latest
    environment: staging
    outputs:
      can_deploy: ${{ steps.gate.outputs.can_deploy }}
    env:
      MIKRUS_HOST: ${{ secrets.MIKRUS_HOST }}
      MIKRUS_USER: ${{ secrets.MIKRUS_USER }}
      MIKRUS_SSH_KEY: ${{ secrets.MIKRUS_SSH_KEY }}
      MIKRUS_KNOWN_HOSTS: ${{ secrets.MIKRUS_KNOWN_HOSTS }}
      MIKRUS_ENV_FILE: ${{ secrets.MIKRUS_ENV_FILE }}
    steps:
      - name: Detect staging deployment credentials
        id: gate
        run: |
          missing=0

          for value in \
            "$MIKRUS_HOST" \
            "$MIKRUS_USER" \
            "$MIKRUS_SSH_KEY" \
            "$MIKRUS_KNOWN_HOSTS" \
            "$MIKRUS_ENV_FILE"
          do
            if [ -z "$value" ]; then
              missing=1
            fi
          done

          if [ "$missing" -eq 0 ]; then
            echo "can_deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "can_deploy=false" >> "$GITHUB_OUTPUT"
          fi

  deploy-staging:
    if: ${{ needs.staging-deployment-gate.outputs.can_deploy == 'true' && github.event_name == 'workflow_dispatch' && (github.event.inputs.deploy_target == 'staging' || github.event.inputs.deploy_target == 'both') }}
    runs-on: ubuntu-latest
    needs: [build-and-push, staging-deployment-gate]
    concurrency:
      group: mikrus-deploy-${{ github.ref }}
      cancel-in-progress: false
    environment: staging
    env:
      REMOTE_HOST: ${{ secrets.MIKRUS_HOST }}
      REMOTE_USER: ${{ secrets.MIKRUS_USER }}
      REMOTE_PORT: ${{ vars.MIKRUS_PORT }}
      DEPLOY_PATH: ${{ vars.MIKRUS_DEPLOY_PATH }}
      KNOWN_HOSTS: ${{ secrets.MIKRUS_KNOWN_HOSTS }}
      REMOTE_ENV_FILE: ${{ secrets.MIKRUS_ENV_FILE }}
      GHCR_USERNAME: ${{ github.actor }}
      GHCR_TOKEN: ${{ github.token }}
      APP_IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v6

      - name: Load SSH key
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.MIKRUS_SSH_KEY }}

      - name: Configure SSH known hosts
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Prepare deploy bundle
        run: |
          mkdir -p .deploy
          printf '%s\n' "$REMOTE_ENV_FILE" > .deploy/.env
          {
            echo "APP_IMAGE_REPOSITORY=ghcr.io/${GITHUB_REPOSITORY}"
            echo "APP_IMAGE_TAG=${APP_IMAGE_TAG}"
          } >> .deploy/.env
          cp infra/mikrus/docker-compose.yml .deploy/docker-compose.yml

      - name: Upload deploy bundle
        run: |
          remote_port="${REMOTE_PORT:-22}"
          remote_path="${DEPLOY_PATH:-/home/$REMOTE_USER/apps/demo-fortis}"
          remote_host="${REMOTE_HOST#[}"
          remote_host="${remote_host%]}"
          scp_host="$remote_host"
          if [[ "$scp_host" == *:* ]]; then
            scp_host="[$scp_host]"
          fi
          ssh_target="$REMOTE_USER@$remote_host"
          scp_target="$REMOTE_USER@$scp_host"
          ssh -p "$remote_port" "$ssh_target" "mkdir -p '$remote_path'"
          scp -P "$remote_port" .deploy/docker-compose.yml .deploy/.env "$scp_target:$remote_path/"

      - name: Deploy to Mikrus staging
        run: |
          remote_port="${REMOTE_PORT:-22}"
          remote_path="${DEPLOY_PATH:-/home/$REMOTE_USER/apps/demo-fortis}"
          remote_host="${REMOTE_HOST#[}"
          remote_host="${remote_host%]}"
          ssh_target="$REMOTE_USER@$remote_host"

          printf '%s' "$GHCR_TOKEN" | ssh -p "$remote_port" "$ssh_target" \
            "docker login ghcr.io -u '$GHCR_USERNAME' --password-stdin"

          ssh -p "$remote_port" "$ssh_target" "set -euo pipefail
            cd '$remote_path'
            docker compose pull app queue scheduler
            docker compose up -d --remove-orphans
            docker compose exec -T app php artisan migrate --force
            docker compose exec -T app php artisan storage:link || true
            docker compose exec -T app php artisan optimize:clear
            docker compose exec -T app php artisan config:cache
            docker compose exec -T app php artisan route:cache
            docker compose exec -T app php artisan view:cache"

  production-deployment-gate:
    runs-on: ubuntu-latest
    environment: production
    outputs:
      can_deploy: ${{ steps.gate.outputs.can_deploy }}
    env:
      MIKRUS_HOST: ${{ secrets.MIKRUS_HOST }}
      MIKRUS_USER: ${{ secrets.MIKRUS_USER }}
      MIKRUS_SSH_KEY: ${{ secrets.MIKRUS_SSH_KEY }}
      MIKRUS_KNOWN_HOSTS: ${{ secrets.MIKRUS_KNOWN_HOSTS }}
      MIKRUS_ENV_FILE: ${{ secrets.MIKRUS_ENV_FILE }}
    steps:
      - name: Detect production deployment credentials
        id: gate
        run: |
          missing=0

          for value in \
            "$MIKRUS_HOST" \
            "$MIKRUS_USER" \
            "$MIKRUS_SSH_KEY" \
            "$MIKRUS_KNOWN_HOSTS" \
            "$MIKRUS_ENV_FILE"
          do
            if [ -z "$value" ]; then
              missing=1
            fi
          done

          if [ "$missing" -eq 0 ]; then
            echo "can_deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "can_deploy=false" >> "$GITHUB_OUTPUT"
          fi

  deploy-production:
    if: ${{ needs.production-deployment-gate.outputs.can_deploy == 'true' && (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.deploy_target == 'production' || github.event.inputs.deploy_target == 'both'))) }}
    runs-on: ubuntu-latest
    needs: [build-and-push, production-deployment-gate]
    concurrency:
      group: mikrus-deploy-${{ github.ref }}
      cancel-in-progress: false
    environment: production
    env:
      REMOTE_HOST: ${{ secrets.MIKRUS_HOST }}
      REMOTE_USER: ${{ secrets.MIKRUS_USER }}
      REMOTE_PORT: ${{ vars.MIKRUS_PORT }}
      DEPLOY_PATH: ${{ vars.MIKRUS_DEPLOY_PATH }}
      KNOWN_HOSTS: ${{ secrets.MIKRUS_KNOWN_HOSTS }}
      REMOTE_ENV_FILE: ${{ secrets.MIKRUS_ENV_FILE }}
      GHCR_USERNAME: ${{ github.actor }}
      GHCR_TOKEN: ${{ github.token }}
      APP_IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v6

      - name: Load SSH key
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.MIKRUS_SSH_KEY }}

      - name: Configure SSH known hosts
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Prepare deploy bundle
        run: |
          mkdir -p .deploy
          printf '%s\n' "$REMOTE_ENV_FILE" > .deploy/.env
          {
            echo "APP_IMAGE_REPOSITORY=ghcr.io/${GITHUB_REPOSITORY}"
            echo "APP_IMAGE_TAG=${APP_IMAGE_TAG}"
          } >> .deploy/.env
          cp infra/mikrus/docker-compose.yml .deploy/docker-compose.yml

      - name: Upload deploy bundle
        run: |
          remote_port="${REMOTE_PORT:-22}"
          remote_path="${DEPLOY_PATH:-/home/$REMOTE_USER/apps/demo-fortis}"
          remote_host="${REMOTE_HOST#[}"
          remote_host="${remote_host%]}"
          scp_host="$remote_host"
          if [[ "$scp_host" == *:* ]]; then
            scp_host="[$scp_host]"
          fi
          ssh_target="$REMOTE_USER@$remote_host"
          scp_target="$REMOTE_USER@$scp_host"
          ssh -p "$remote_port" "$ssh_target" "mkdir -p '$remote_path'"
          scp -P "$remote_port" .deploy/docker-compose.yml .deploy/.env "$scp_target:$remote_path/"

      - name: Deploy to Mikrus production
        run: |
          remote_port="${REMOTE_PORT:-22}"
          remote_path="${DEPLOY_PATH:-/home/$REMOTE_USER/apps/demo-fortis}"
          remote_host="${REMOTE_HOST#[}"
          remote_host="${remote_host%]}"
          ssh_target="$REMOTE_USER@$remote_host"

          printf '%s' "$GHCR_TOKEN" | ssh -p "$remote_port" "$ssh_target" \
            "docker login ghcr.io -u '$GHCR_USERNAME' --password-stdin"

          ssh -p "$remote_port" "$ssh_target" "set -euo pipefail
            cd '$remote_path'
            docker compose pull app queue scheduler
            docker compose up -d --remove-orphans
            docker compose exec -T app php artisan migrate --force
            docker compose exec -T app php artisan storage:link || true
            docker compose exec -T app php artisan optimize:clear
            docker compose exec -T app php artisan config:cache
            docker compose exec -T app php artisan route:cache
            docker compose exec -T app php artisan view:cache"
