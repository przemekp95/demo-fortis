name: CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: echo "image_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./apps/web
          file: ./apps/web/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}:${{ steps.meta.outputs.image_tag }}

  deployment-gate:
    runs-on: ubuntu-latest
    outputs:
      can_deploy: ${{ steps.gate.outputs.can_deploy }}
    steps:
      - name: Detect deployment credentials
        id: gate
        run: |
          if [ -n "${{ secrets.KUBE_CONFIG }}" ]; then
            echo "can_deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "can_deploy=false" >> "$GITHUB_OUTPUT"
          fi

  deploy-staging:
    if: ${{ needs.deployment-gate.outputs.can_deploy == 'true' }}
    runs-on: ubuntu-latest
    needs: [build-and-push, deployment-gate]
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-kubectl@v4
      - uses: azure/setup-helm@v4

      - name: Configure Kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" > ~/.kube/config

      - name: Deploy to staging
        run: |
          helm upgrade --install lottery-staging infra/helm/lottery \
            --namespace lottery-staging \
            --create-namespace \
            --set image.repository=ghcr.io/${{ github.repository }} \
            --set image.tag=${{ needs.build-and-push.outputs.image_tag }} \
            -f infra/helm/lottery/values-staging.yaml

  deploy-production:
    if: ${{ needs.deployment-gate.outputs.can_deploy == 'true' }}
    runs-on: ubuntu-latest
    needs: [build-and-push, deployment-gate, deploy-staging]
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-kubectl@v4
      - uses: azure/setup-helm@v4

      - name: Configure Kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" > ~/.kube/config

      - name: Deploy to production
        run: |
          helm upgrade --install lottery-production infra/helm/lottery \
            --namespace lottery-production \
            --create-namespace \
            --set image.repository=ghcr.io/${{ github.repository }} \
            --set image.tag=${{ needs.build-and-push.outputs.image_tag }} \
            -f infra/helm/lottery/values-production.yaml
