name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, pdo, pdo_sqlite, pdo_mysql, bcmath, pcntl
          coverage: xdebug

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: |
          composer install --no-interaction --prefer-dist
          npm ci

      - name: Dependency security audit
        run: |
          composer audit --format=json --no-interaction > composer-audit.json || true
          php <<'PHP'
          <?php
          $report = json_decode(file_get_contents('composer-audit.json'), true);
          $violations = [];

          foreach (($report['advisories'] ?? []) as $package => $advisories) {
              foreach ($advisories as $advisory) {
                  $severity = strtolower((string) ($advisory['severity'] ?? 'unknown'));

                  if (in_array($severity, ['medium', 'high', 'critical'], true)) {
                      $violations[] = sprintf(
                          '%s [%s] %s',
                          $package,
                          strtoupper($severity),
                          (string) ($advisory['title'] ?? 'Unknown advisory')
                      );
                  }
              }
          }

          if (count($violations) > 0) {
              fwrite(STDERR, "Composer audit found medium/high/critical advisories:\n".implode("\n", $violations)."\n");
              exit(1);
          }

          echo "Composer audit passed: no medium/high/critical advisories.\n";
          PHP
          npm audit --audit-level=moderate

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Run migrations
        env:
          CACHE_DRIVER: file
          DB_CONNECTION: sqlite
          DB_DATABASE: ':memory:'
        run: php artisan migrate --force

      - name: Quality gates
        run: |
          ./vendor/bin/pint --test
          ./vendor/bin/phpstan analyse --memory-limit=1G
          npm run lint
          npm run format:check

      - name: Test critical backend paths with coverage
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ':memory:'
        run: php artisan test --coverage-clover=coverage.xml

      - name: Enforce critical backend coverage >= 85%
        run: |
          php <<'PHP'
          <?php
          $xml = simplexml_load_file('coverage.xml');
          $metrics = $xml->project->metrics;
          $coverage = ((int) $metrics['coveredstatements'] / max((int) $metrics['statements'], 1)) * 100;

          echo 'Backend coverage: '.round($coverage, 2)."%\n";

          if ($coverage < 85) {
              fwrite(STDERR, "Coverage below 85%\n");
              exit(1);
          }
          PHP

  frontend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - name: Frontend utility tests with coverage >= 80%
        run: npm run test:coverage

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npm run build

  container-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build image for scan
        run: docker build -t fortis-lottery:ci ./apps/web
      - name: Trivy image scan (HIGH/CRITICAL)
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:0.56.1 image \
            --scanners vuln \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 1 \
            fortis-lottery:ci

  e2e-smoke:
    runs-on: ubuntu-latest
    needs: [backend, frontend-tests, frontend-build, container-security]
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, pdo, pdo_sqlite

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install app dependencies
        run: |
          composer install --no-interaction --prefer-dist
          npm ci
          npm run build

      - name: Prepare app
        run: |
          cp .env.example .env
          php artisan key:generate
          touch database/database.sqlite
          {
            echo "DB_CONNECTION=sqlite"
            echo "DB_DATABASE=\"$(pwd)/database/database.sqlite\""
            echo "CACHE_DRIVER=file"
            echo "QUEUE_CONNECTION=sync"
            echo "SESSION_DRIVER=file"
          } >> .env
          php artisan migrate --seed --force

      - name: Start app server
        run: php artisan serve --host=127.0.0.1 --port=8000 > /tmp/laravel.log 2>&1 &

      - name: Install Playwright
        working-directory: tests/e2e
        run: |
          npm ci
          npx playwright install chromium

      - name: Run smoke tests
        working-directory: tests/e2e
        env:
          E2E_BASE_URL: http://127.0.0.1:8000
        run: npm test
