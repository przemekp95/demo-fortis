openapi: 3.0.3
info:
  title: Fortis Lottery Public API
  version: v1
  description: Read-only public API for campaign and draw visibility.
servers:
  - url: /api/v1
security:
  - bearerAuth: []
paths:
  /campaign/current:
    get:
      summary: Get current campaign
      operationId: getCurrentCampaign
      responses:
        '200':
          description: Active campaign
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CampaignResponse'
        '404':
          description: No active campaign
  /campaign/current/prizes:
    get:
      summary: Get prizes for current campaign
      operationId: getCurrentCampaignPrizes
      responses:
        '200':
          description: Prize list for the active campaign
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrizeListResponse'
        '404':
          description: No active campaign
  /draws/history:
    get:
      summary: Get historical draw runs
      operationId: getDrawHistory
      responses:
        '200':
          description: Paginated draw history
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DrawRunPaginatedResponse'
  /winners:
    get:
      summary: Get published winners with masked participant data
      operationId: getWinners
      responses:
        '200':
          description: Paginated winner list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WinnerPaginatedResponse'
  /stats/public:
    get:
      summary: Get public platform statistics
      operationId: getPublicStats
      responses:
        '200':
          description: Public KPIs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicStatsResponse'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Token
  schemas:
    CampaignResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/Campaign'
    PrizeListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Prize'
    DrawRunPaginatedResponse:
      type: object
      required: [data, links, meta]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/DrawRun'
        links:
          $ref: '#/components/schemas/PaginationLinks'
        meta:
          $ref: '#/components/schemas/PaginationMeta'
    WinnerPaginatedResponse:
      type: object
      required: [data, links, meta]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Winner'
        links:
          $ref: '#/components/schemas/PaginationLinks'
        meta:
          $ref: '#/components/schemas/PaginationMeta'
    PublicStatsResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/PublicStats'
    Campaign:
      type: object
      required: [id, name, status, starts_at, ends_at, final_draw_at]
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        status:
          type: string
        description:
          type: string
          nullable: true
        starts_at:
          type: string
          format: date-time
        ends_at:
          type: string
          format: date-time
        final_draw_at:
          type: string
          format: date-time
    Prize:
      type: object
      required: [id, name, draw_type, quantity, value]
      properties:
        id:
          type: integer
        name:
          type: string
        draw_type:
          type: string
          enum: [daily, final]
        quantity:
          type: integer
        value:
          type: number
          format: float
    DrawRun:
      type: object
      required: [id, campaign_id, type, status, started_at, finished_at, winner_count]
      properties:
        id:
          type: integer
        campaign_id:
          type: integer
        type:
          type: string
          enum: [daily, final]
        status:
          type: string
          enum: [pending, running, completed, failed]
        started_at:
          type: string
          format: date-time
          nullable: true
        finished_at:
          type: string
          format: date-time
          nullable: true
        winner_count:
          type: integer
    Winner:
      type: object
      required: [id, campaign_id, draw_run_id, entry_id, published_at, winner]
      properties:
        id:
          type: integer
        campaign_id:
          type: integer
        draw_run_id:
          type: integer
        entry_id:
          type: integer
        campaign_name:
          type: string
          nullable: true
        prize_name:
          type: string
          nullable: true
        winner:
          type: object
          required: [email, city]
          properties:
            email:
              type: string
              nullable: true
            city:
              type: string
              nullable: true
        published_at:
          type: string
          format: date-time
    PublicStats:
      type: object
      required: [entries_total, winners_total, active_campaigns]
      properties:
        entries_total:
          type: integer
        winners_total:
          type: integer
        active_campaigns:
          type: integer
    PaginationLinks:
      type: object
      required: [first, last, prev, next]
      properties:
        first:
          type: string
          nullable: true
        last:
          type: string
          nullable: true
        prev:
          type: string
          nullable: true
        next:
          type: string
          nullable: true
    PaginationMeta:
      type: object
      required: [current_page, from, last_page, links, path, per_page, to, total]
      properties:
        current_page:
          type: integer
        from:
          type: integer
          nullable: true
        last_page:
          type: integer
        links:
          type: array
          items:
            $ref: '#/components/schemas/PaginationMetaLink'
        path:
          type: string
        per_page:
          type: integer
        to:
          type: integer
          nullable: true
        total:
          type: integer
    PaginationMetaLink:
      type: object
      required: [url, label, active]
      properties:
        url:
          type: string
          nullable: true
        label:
          type: string
        active:
          type: boolean
