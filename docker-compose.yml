services:
  app:
    build:
      context: ./apps/web
      dockerfile: Dockerfile.dev
    container_name: fortis-app
    working_dir: /var/www/html
    command: sh -lc "composer install && php artisan serve --host=0.0.0.0 --port=8000"
    volumes:
      - ./apps/web:/var/www/html
    ports:
      - "8080:8000"
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8080
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: fortis_lottery
      DB_USERNAME: fortis
      DB_PASSWORD: fortis
      REDIS_HOST: redis
      CACHE_DRIVER: redis
      QUEUE_CONNECTION: redis
      MAIL_HOST: mailpit
      MAIL_PORT: 1025
    depends_on:
      - mysql
      - redis
      - mailpit

  queue:
    build:
      context: ./apps/web
      dockerfile: Dockerfile.dev
    container_name: fortis-queue
    working_dir: /var/www/html
    command: sh -lc "composer install && php artisan horizon"
    volumes:
      - ./apps/web:/var/www/html
    environment:
      APP_ENV: local
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: fortis_lottery
      DB_USERNAME: fortis
      DB_PASSWORD: fortis
      REDIS_HOST: redis
      CACHE_DRIVER: redis
      QUEUE_CONNECTION: redis
    depends_on:
      - app

  scheduler:
    build:
      context: ./apps/web
      dockerfile: Dockerfile.dev
    container_name: fortis-scheduler
    working_dir: /var/www/html
    command: sh -lc "composer install && php artisan schedule:work"
    volumes:
      - ./apps/web:/var/www/html
    environment:
      APP_ENV: local
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: fortis_lottery
      DB_USERNAME: fortis
      DB_PASSWORD: fortis
      REDIS_HOST: redis
      CACHE_DRIVER: redis
      QUEUE_CONNECTION: redis
    depends_on:
      - app

  vite:
    image: node:20
    container_name: fortis-vite
    working_dir: /var/www/html
    command: sh -lc "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    volumes:
      - ./apps/web:/var/www/html
    ports:
      - "5173:5173"

  mysql:
    image: mysql:8.0
    container_name: fortis-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: fortis_lottery
      MYSQL_USER: fortis
      MYSQL_PASSWORD: fortis
    ports:
      - "33060:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7
    container_name: fortis-redis
    ports:
      - "63790:6379"

  mailpit:
    image: axllent/mailpit:latest
    container_name: fortis-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  mysql_data:
