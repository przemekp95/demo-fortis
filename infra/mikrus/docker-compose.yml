name: ${COMPOSE_PROJECT_NAME:-fortis}

x-app-env: &app-env
  APP_NAME: ${APP_NAME:-Fortis Lottery}
  APP_ENV: ${APP_ENV:-production}
  APP_DEBUG: ${APP_DEBUG:-false}
  APP_KEY: ${APP_KEY}
  APP_URL: ${APP_URL}
  LOG_CHANNEL: ${LOG_CHANNEL:-stack}
  LOG_LEVEL: ${LOG_LEVEL:-info}
  DB_CONNECTION: mysql
  DB_HOST: mysql
  DB_PORT: 3306
  DB_DATABASE: ${DB_DATABASE}
  DB_USERNAME: ${DB_USERNAME}
  DB_PASSWORD: ${DB_PASSWORD}
  BROADCAST_DRIVER: ${BROADCAST_DRIVER:-log}
  CACHE_DRIVER: ${CACHE_DRIVER:-redis}
  FILESYSTEM_DISK: ${FILESYSTEM_DISK:-local}
  QUEUE_CONNECTION: ${QUEUE_CONNECTION:-redis}
  SESSION_DRIVER: ${SESSION_DRIVER:-file}
  SESSION_LIFETIME: ${SESSION_LIFETIME:-120}
  REDIS_HOST: redis
  REDIS_PORT: 6379
  REDIS_PASSWORD: ${REDIS_PASSWORD:-}
  MAIL_MAILER: ${MAIL_MAILER:-smtp}
  MAIL_HOST: ${MAIL_HOST:-mailpit}
  MAIL_PORT: ${MAIL_PORT:-1025}
  MAIL_USERNAME: ${MAIL_USERNAME:-}
  MAIL_PASSWORD: ${MAIL_PASSWORD:-}
  MAIL_ENCRYPTION: ${MAIL_ENCRYPTION:-}
  MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-noreply@fortis.test}
  MAIL_FROM_NAME: ${MAIL_FROM_NAME:-Fortis Lottery}
  HORIZON_PREFIX: ${HORIZON_PREFIX:-fortis_horizon}
  AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
  AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
  AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
  AWS_BUCKET: ${AWS_BUCKET:-}
  AWS_USE_PATH_STYLE_ENDPOINT: ${AWS_USE_PATH_STYLE_ENDPOINT:-false}
  PUSHER_APP_ID: ${PUSHER_APP_ID:-}
  PUSHER_APP_KEY: ${PUSHER_APP_KEY:-}
  PUSHER_APP_SECRET: ${PUSHER_APP_SECRET:-}
  PUSHER_HOST: ${PUSHER_HOST:-}
  PUSHER_PORT: ${PUSHER_PORT:-443}
  PUSHER_SCHEME: ${PUSHER_SCHEME:-https}
  PUSHER_APP_CLUSTER: ${PUSHER_APP_CLUSTER:-mt1}
  VITE_PUSHER_APP_KEY: ${VITE_PUSHER_APP_KEY:-}
  VITE_PUSHER_HOST: ${VITE_PUSHER_HOST:-}
  VITE_PUSHER_PORT: ${VITE_PUSHER_PORT:-443}
  VITE_PUSHER_SCHEME: ${VITE_PUSHER_SCHEME:-https}
  VITE_PUSHER_APP_CLUSTER: ${VITE_PUSHER_APP_CLUSTER:-mt1}

services:
  app:
    image: ${APP_IMAGE_REPOSITORY}:${APP_IMAGE_TAG}
    restart: unless-stopped
    environment: *app-env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - app_storage:/var/www/html/storage

  queue:
    image: ${APP_IMAGE_REPOSITORY}:${APP_IMAGE_TAG}
    restart: unless-stopped
    command: php artisan horizon
    environment: *app-env
    depends_on:
      app:
        condition: service_started
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - app_storage:/var/www/html/storage

  scheduler:
    image: ${APP_IMAGE_REPOSITORY}:${APP_IMAGE_TAG}
    restart: unless-stopped
    command: php artisan schedule:work
    environment: *app-env
    depends_on:
      app:
        condition: service_started
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - app_storage:/var/www/html/storage

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    command:
      - --default-authentication-plugin=mysql_native_password
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  app_storage:
  mysql_data:
  redis_data:
