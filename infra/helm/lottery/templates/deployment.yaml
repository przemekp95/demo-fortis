apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "lottery.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "lottery.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "lottery.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      component: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "lottery.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        component: web
    spec:
      containers:
        - name: web
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 80
          envFrom:
            - configMapRef:
                name: {{ include "lottery.fullname" . }}-config
            - secretRef:
                name: {{ include "lottery.fullname" . }}-secrets
          resources:
{{ toYaml .Values.resources.web | indent 12 }}
